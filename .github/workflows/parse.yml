name: parse

# Daily freshness sweep + per-crate parse jobs.
#
# Two triggers:
#   - cron 03:00 UTC daily for the routine sweep
#   - workflow_dispatch for manual runs (force a list, raise the cap, etc.)
#
# Three jobs, in series:
#   1. freshness — reads R2 + crates.io, emits matrix of stale crates
#   2. parse     — matrix over freshness output; one crate per shard
#   3. summary   — gathers job results and posts a one-line digest
#
# Std crates are out of scope here — see std.yml.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Comma-separated crate names to force-parse (skip freshness)'
        required: false
        default: ''
      max_crates:
        description: 'Cap on stale crates parsed this run'
        required: false
        default: '20'
      watchlist:
        description: "'catalog' | 'top:N' | path/to/file"
        required: false
        default: 'catalog'

env:
  R2_BUCKET: crate-graphs
  PARSER_REVISION: ${{ github.sha }}

jobs:
  freshness:
    name: freshness sweep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.sweep.outputs.matrix }}
      count: ${{ steps.sweep.outputs.count }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        working-directory: codeview-ui
        run: bun install --frozen-lockfile

      - name: Run freshness sweep
        id: sweep
        working-directory: codeview-ui
        env:
          STATIC_R2_TARGET: remote
          WATCHLIST: ${{ inputs.watchlist || 'catalog' }}
          MAX_CRATES: ${{ inputs.max_crates || '20' }}
          FORCE: ${{ inputs.force || '' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: bun scripts/freshness-sweep.ts

  parse:
    name: parse ${{ matrix.crate.name }}@${{ matrix.crate.version }}
    needs: freshness
    if: needs.freshness.outputs.count != '0' && needs.freshness.outputs.count != ''
    runs-on: ubuntu-latest
    strategy:
      # One crate failing must NOT abort the rest of the sweep. The summary
      # job collects results; persistent failures will get a freshness
      # marker so we don't burn cycles re-parsing them every day.
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.freshness.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly (for parser builds via cargo)
        # Pinned to the master HEAD SHA at audit time for supply-chain
        # hardening (the action itself uses floating @nightly/@stable tags
        # for toolchain selection, not action versioning). Update the SHA
        # after reviewing the diff at github.com/dtolnay/rust-toolchain.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          # Each matrix shard parses one crate; share the cargo build cache
          # for codeview-rustdoc across shards (the cache key is per-OS + per-
          # rust-toolchain by default — that's what we want).
          shared-key: parse-one

      - uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        working-directory: codeview-ui
        run: bun install --frozen-lockfile

      - name: Parse + publish + record freshness
        working-directory: codeview-ui
        env:
          NAME: ${{ matrix.crate.name }}
          VERSION: ${{ matrix.crate.version }}
          STATIC_R2_TARGET: remote
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        # parse-one.ts exit codes: 0=ok, 64=transient (retry next sweep),
        # 65=permanent (don't retry until parser changes), 70=internal bug.
        # We capture the code but let the job mark itself accordingly.
        run: |
          set +e
          bun scripts/parse-one.ts
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          case $code in
            0)  echo "::notice title=parse $NAME@$VERSION::ok" ;;
            64) echo "::warning title=parse $NAME@$VERSION::transient — will retry next sweep" ;;
            65) echo "::warning title=parse $NAME@$VERSION::permanent — skipping until parser/schema changes" ;;
            *)  echo "::error title=parse $NAME@$VERSION::internal error (exit $code)" ;;
          esac
          # Translate non-success-but-handled codes back to 0 so they don't
          # show as red job failures. The summary job treats them separately.
          exit $([ $code -le 65 ] && echo 0 || echo $code)
        id: parse

  catalog:
    name: rebuild catalog
    needs: [freshness, parse]
    # Rebuild even on partial parse-job failures — the catalog reflects
    # whatever made it into R2. Skip only if no work was attempted.
    if: always() && needs.freshness.outputs.count != '0' && needs.freshness.outputs.count != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - working-directory: codeview-ui
        run: bun install --frozen-lockfile
      - name: Rebuild rust/catalog.json from freshness index
        working-directory: codeview-ui
        env:
          STATIC_R2_TARGET: remote
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: bun scripts/rebuild-catalog.ts

  summary:
    name: parse summary
    needs: [freshness, parse, catalog]
    if: always() && needs.freshness.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Echo summary
        run: |
          echo "freshness produced ${{ needs.freshness.outputs.count }} stale crates"
          echo "parse job result: ${{ needs.parse.result }}"
          echo "catalog job result: ${{ needs.catalog.result }}"
